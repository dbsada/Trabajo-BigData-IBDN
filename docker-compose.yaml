services:
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092' # <--- Flask usará esto
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - ./data/kafka:/var/lib/kafka/data

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    profiles: ["db_mongo"]  # <--- Solo sube si pides mongo
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    profiles: ["db_cassandra"] # <--- Solo sube si pides cassandra
    ports:
      - "9042:9042"
    volumes:
      - ./data/cassandra:/var/lib/cassandra

  spark:
    build:
      context: .
      dockerfile: docker/dockerfile.spark
    container_name: spark
    ports:
      - "${SPARK_MASTER_UI_PORT}:8080"
      - "${SPARK_MASTER_PORT}:${SPARK_MASTER_PORT}"
    volumes:
      - .:/app
      - ./data/coursier:/root/.cache/coursier
      - ./data/ivy2:/root/.ivy2
    working_dir: /app
    environment:
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}

  spark-worker:
    build:
      context: .
      dockerfile: docker/dockerfile.spark
    container_name: spark-worker
    depends_on:
      - spark
    volumes:
      - .:/app
      - ./data/coursier:/root/.cache/coursier
      - ./data/ivy2:/root/.ivy2
    working_dir: /app
    environment:
      - SPARK_MASTER=${SPARK_MASTER_URL}
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker ${SPARK_MASTER_URL}

  flask:
    build:
      context: .
      dockerfile: docker/dockerfile.python
    container_name: flask
    ports:
      - "${FLASK_PORT}:${FLASK_PORT}"
    depends_on:
      - kafka
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FLASK_DEBUG=1
      - PROJECT_HOME=/app/
      - DB_MODE=${DB_MODE:-cassandra}
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_LOCAL_BOOTSTRAP_SERVERS=${KAFKA_LOCAL_BOOTSTRAP_SERVERS}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - KAFKA_RESPONSE_TOPIC=${KAFKA_RESPONSE_TOPIC}
      - KAFKA_STATUS_TOPIC=${KAFKA_STATUS_TOPIC}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}

  mlflow:
    image: python:3.9-slim
    container_name: mlflow
    ports:
      - "${MLFLOW_PORT}:5000"
    volumes:
      - ./data/mlflow:/data/mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    command: >
      sh -c "pip install -q mlflow boto3 && mlflow server --host 0.0.0.0 --backend-store-uri sqlite:///data/mlflow/mlflow.db --default-artifact-root s3a://lakehouse/mlflow/"
    depends_on:
      - minio

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "${MINIO_API_PORT}:${MINIO_API_PORT}"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_data: