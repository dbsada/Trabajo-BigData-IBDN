services:
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 1G

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
      - CASSANDRA_HINTED_HANDOFF_ENABLED=false
    volumes:
      - cassandra_data:/var/lib/cassandra
    deploy:
      resources:
        limits:
          memory: 2G

  spark-manager:
    container_name: spark-manager
    build:
      context: .
      dockerfile: docker/dockerfile.spark
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - MLFLOW_TRACKING_URI=${MLFLOW_URI:-http://mlflow:5000}
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host 0.0.0.0
    deploy:
      resources:
        limits:
          memory: 2G

  spark-worker:
    container_name: spark-worker
    build:
      context: .
      dockerfile: docker/dockerfile.spark
    depends_on:
      - spark-manager
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - SPARK_MASTER=spark://spark-manager:7077
      - SPARK_WORKER_MEMORY=6G
      - SPARK_WORKER_CORES=8
      - MLFLOW_TRACKING_URI=${MLFLOW_URI:-http://mlflow:5000}
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-manager:7077
    deploy:
      resources:
        limits:
          memory: 7G

  flask:
    container_name: flask
    build:
      context: .
      dockerfile: docker/dockerfile.python
    ports:
      - "${FLASK_PORT:-5001}:5001"
    depends_on:
      - kafka
    volumes:
      - .:/app
    environment:
      - FLASK_DEBUG=1
      - PROJECT_HOME=${PROJECT_HOME:-/app}
      - KAFKA=${KAFKA:-kafka:9092}
      - TOPIC_IN=${TOPIC_IN:-request}
      - TOPIC_OUT=${TOPIC_OUT:-response}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_USER=${MINIO_USER:-admin}
      - MINIO_PASSWORD=${MINIO_PASSWORD:-password}
      - MLFLOW_URI=${MLFLOW_URI:-http://mlflow:5000}
      - DEPLOY_MODE=${DEPLOY_MODE:-local}
    deploy:
      resources:
        limits:
          memory: 512M

  mlflow:
    image: python:3.9-slim
    ports:
      - "${MLFLOW_PORT:-5003}:5000"
    volumes:
      - mlflow_data:/data/mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-password}
    command: sh -c "pip install -q mlflow boto3 && mlflow server --host 0.0.0.0 --backend-store-uri sqlite:///data/mlflow/mlflow.db --default-artifact-root s3a://lakehouse/mlflow/"
    depends_on:
      - minio
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 768M

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-password}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    image: postgres:13
    ports:
      - "${AIRFLOW_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M

  airflow-init:
    build:
      context: .
      dockerfile: docker/dockerfile.airflow
    depends_on:
      - postgres
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__EXECUTION_API__JWT_AUDIENCE: urn:airflow.apache.org:task
      AIRFLOW__API_AUTH__JWT_SECRET: "7768751063fa88c0b8efcad2d4d8c68d"
      AIRFLOW__API__SECRET_KEY: "7768751063fa88c0b8efcad2d4d8c68d"
      AIRFLOW__SDK__API_URL: http://airflow-webserver:8080/
      AIRFLOW__API__BASE_URL: http://airflow-webserver:8080
    volumes:
      - .:/app
      - ./dags:/opt/airflow/dags
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --firstname Admin --lastname User
          --role Admin --email admin@example.com --password admin 2>/dev/null || true
      "

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/dockerfile.airflow
    depends_on:
      - postgres
    restart: on-failure
    ports:
      - "${AIRFLOW_UI_PORT:-8085}:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "True"
      AIRFLOW_CONN_SPARK_MASTER: http://spark-manager:8080
      MLFLOW_TRACKING_URI: ${MLFLOW_URI:-http://mlflow:5000}
      AIRFLOW__EXECUTION_API__JWT_AUDIENCE: urn:airflow.apache.org:task
      AIRFLOW__API_AUTH__JWT_SECRET: "7768751063fa88c0b8efcad2d4d8c68d"
      AIRFLOW__API__SECRET_KEY: "7768751063fa88c0b8efcad2d4d8c68d"
      AIRFLOW__API__ACCESS_CONTROL_ALLOW_HEADERS: "*"
      AIRFLOW__API__ACCESS_CONTROL_ALLOW_ORIGIN: "*"
    volumes:
      - .:/app
      - ./dags:/opt/airflow/dags
    command: api-server -p 8080 --apps all
    deploy:
      resources:
        limits:
          memory: 512M

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/dockerfile.airflow
    depends_on:
      - postgres
    restart: on-failure
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AIRFLOW__EXECUTION_API__JWT_AUDIENCE: urn:airflow.apache.org:task
      AIRFLOW__API_AUTH__JWT_SECRET: "7768751063fa88c0b8efcad2d4d8c68d"
      AIRFLOW__API__SECRET_KEY: "7768751063fa88c0b8efcad2d4d8c68d"
      AIRFLOW__SDK__API_URL: http://airflow-webserver:8080/
      AIRFLOW__API__BASE_URL: http://airflow-webserver:8080
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dags:/opt/airflow/dags
    command: scheduler
    deploy:
      resources:
        limits:
          memory: 1G

  airflow-dag-processor:
    build:
      context: .
      dockerfile: docker/dockerfile.airflow
    depends_on:
      - postgres
    restart: on-failure
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__EXECUTION_API__JWT_AUDIENCE: urn:airflow.apache.org:task
      AIRFLOW__API_AUTH__JWT_SECRET: "7768751063fa88c0b8efcad2d4d8c68d"
      AIRFLOW__API__SECRET_KEY: "7768751063fa88c0b8efcad2d4d8c68d"
      AIRFLOW__SDK__API_URL: http://airflow-webserver:8080/
      AIRFLOW__API__BASE_URL: http://airflow-webserver:8080
    volumes:
      - .:/app
      - ./dags:/opt/airflow/dags
    command: dag-processor
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  kafka_data:
  cassandra_data:
  minio_data:
  mlflow_data:
  postgres_data:
