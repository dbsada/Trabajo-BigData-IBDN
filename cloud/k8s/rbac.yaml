apiVersion: v1
kind: ServiceAccount
metadata:
  name: flask-sa
  namespace: ibdn
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flask-reader
rules:
- apiGroups: [""]
  resources: ["nodes", "pods", "pods/log"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flask-reader-binding
subjects:
- kind: ServiceAccount
  name: flask-sa
  namespace: ibdn
roleRef:
  kind: ClusterRole
  name: flask-reader
  apiGroup: rbac.authorization.k8s.io
