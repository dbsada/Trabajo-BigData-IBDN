apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-postgres-pvc
  namespace: ibdn
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-postgres
  namespace: ibdn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-postgres
  template:
    metadata:
      labels:
        app: airflow-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:13
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "airflow"
        - name: POSTGRES_PASSWORD
          value: "airflow"
        - name: POSTGRES_DB
          value: "airflow"
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "128Mi"
          limits:
            memory: "256Mi"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: airflow-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-postgres
  namespace: ibdn
spec:
  selector:
    app: airflow-postgres
  ports:
  - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: ibdn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      initContainers:
      - name: init
        image: europe-west1-docker.pkg.dev/REPLACE_PROJECT/ibdn/airflow:latest
        command: ["bash", "-c"]
        args:
        - |
          cp /config/dags/*.py /opt/airflow/dags/
          airflow db migrate
          python3 -c "
          import psycopg2
          conn = psycopg2.connect('postgresql://airflow:airflow@airflow-postgres:5432/airflow')
          cur = conn.cursor()
          cur.execute(\"INSERT INTO ab_role (id, name) VALUES (1,'Admin'),(2,'User'),(3,'Op'),(4,'Viewer'),(5,'Public') ON CONFLICT DO NOTHING\")
          conn.commit()
          conn.close()
          print('Roles created')
          "
        env:
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: "postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow"
        volumeMounts:
        - name: dags
          mountPath: /config/dags
        - name: dags-target
          mountPath: /opt/airflow/dags
      containers:
      - name: webserver
        image: europe-west1-docker.pkg.dev/REPLACE_PROJECT/ibdn/airflow:latest
        ports:
        - containerPort: 8080
        env:
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: "postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow"
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "false"
        - name: AIRFLOW_CONN_SPARK_MASTER
          value: "http://spark-manager:8080"
        - name: AIRFLOW__API_AUTH__JWT_SECRET
          value: "O217p0w5BdJmK9E82PVAPw=="
        - name: AIRFLOW__API__SECRET_KEY
          value: "acCXuJbBIpfnLu31LZtuUw=="
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            configMapKeyRef:
              name: ibdn-config
              key: MLFLOW_TRACKING_URI
        command: ["bash", "-c"]
        args:
        - |
          PWFILE=/opt/airflow/simple_auth_manager_passwords.json.generated
          airflow api-server &
          APID=$!
          for i in $(seq 1 60); do
            if [ -f "$PWFILE" ] && [ -s "$PWFILE" ]; then
              echo "Password for user admin: $(python3 -c "import json; print(json.load(open('$PWFILE')).get('admin',''))")"
              break
            fi
            sleep 2
          done
          wait $APID
        volumeMounts:
        - name: dags-target
          mountPath: /opt/airflow/dags
        resources:
          requests:
            memory: "256Mi"
          limits:
            memory: "512Mi"
      volumes:
      - name: dags
        configMap:
          name: airflow-dags
      - name: dags-target
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: ibdn
spec:
  selector:
    app: airflow-webserver
  ports:
  - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: ibdn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      initContainers:
      - name: init
        image: europe-west1-docker.pkg.dev/REPLACE_PROJECT/ibdn/airflow:latest
        command: ["bash", "-c"]
        args:
        - |
          cp /config/dags/*.py /opt/airflow/dags/
        volumeMounts:
        - name: dags
          mountPath: /config/dags
        - name: dags-target
          mountPath: /opt/airflow/dags
      containers:
      - name: scheduler
        image: europe-west1-docker.pkg.dev/REPLACE_PROJECT/ibdn/airflow:latest
        env:
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: "postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow"
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "false"
        - name: AIRFLOW__CORE__PARALLELISM
          value: "1"
        - name: AIRFLOW__CORE__EXECUTION_API_SERVER_URL
          value: "http://airflow-webserver:8080/execution/"
        - name: AIRFLOW__SCHEDULER__MAX_TIS_PER_QUERY
          value: "1"
        - name: AIRFLOW__API_AUTH__JWT_SECRET
          value: "O217p0w5BdJmK9E82PVAPw=="
        - name: AIRFLOW__API__SECRET_KEY
          value: "acCXuJbBIpfnLu31LZtuUw=="
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            configMapKeyRef:
              name: ibdn-config
              key: MLFLOW_TRACKING_URI
        command: ["airflow", "scheduler"]
        volumeMounts:
        - name: dags
          mountPath: /config/dags
        - name: dags-target
          mountPath: /opt/airflow/dags
        livenessProbe:
          exec:
            command: ["airflow", "jobs", "check", "--job-type", "SchedulerJob"]
          initialDelaySeconds: 120
          periodSeconds: 60
          timeoutSeconds: 10
        resources:
          requests:
            memory: "256Mi"
          limits:
            memory: "512Mi"
      volumes:
      - name: dags
        configMap:
          name: airflow-dags
      - name: dags-target
        emptyDir: {}
---
