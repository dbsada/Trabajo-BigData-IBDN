apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-postgres-pvc
  namespace: ibdn
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-postgres
  namespace: ibdn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-postgres
  template:
    metadata:
      labels:
        app: airflow-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:13
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "airflow"
        - name: POSTGRES_PASSWORD
          value: "airflow"
        - name: POSTGRES_DB
          value: "airflow"
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "128Mi"
          limits:
            memory: "256Mi"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: airflow-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-postgres
  namespace: ibdn
spec:
  selector:
    app: airflow-postgres
  ports:
  - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: ibdn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      initContainers:
      - name: init
        image: europe-west1-docker.pkg.dev/practica-creativa-496014/ibdn/airflow:latest
        command: ["bash", "-c"]
        args:
        - |
          airflow db migrate
          python3 -c "
          import psycopg2
          conn = psycopg2.connect('postgresql://airflow:airflow@airflow-postgres:5432/airflow')
          cur = conn.cursor()
          cur.execute(\"INSERT INTO ab_role (id, name) VALUES (1,'Admin'),(2,'User'),(3,'Op'),(4,'Viewer'),(5,'Public') ON CONFLICT DO NOTHING\")
          conn.commit()
          conn.close()
          print('Roles created')
          "
        env:
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: "postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow"
      containers:
      - name: webserver
        image: europe-west1-docker.pkg.dev/practica-creativa-496014/ibdn/airflow:latest
        ports:
        - containerPort: 8080
        env:
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: "postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow"
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "false"
        - name: AIRFLOW_CONN_SPARK_MASTER
          value: "http://spark-manager:8080"
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            configMapKeyRef:
              name: ibdn-config
              key: MLFLOW_TRACKING_URI
        - name: _AIRFLOW_WWW_USER_USERNAME
          value: "admin"
        - name: _AIRFLOW_WWW_USER_PASSWORD
          value: "admin"
        - name: _AIRFLOW_WWW_USER_FIRSTNAME
          value: "Admin"
        - name: _AIRFLOW_WWW_USER_LASTNAME
          value: "User"
        - name: _AIRFLOW_WWW_USER_EMAIL
          value: "admin@example.com"
        - name: _AIRFLOW_WWW_USER_ROLE
          value: "Admin"
        command: ["airflow", "api-server"]
        resources:
          requests:
            memory: "256Mi"
          limits:
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: ibdn
spec:
  selector:
    app: airflow-webserver
  ports:
  - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: ibdn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      containers:
      - name: scheduler
        image: europe-west1-docker.pkg.dev/practica-creativa-496014/ibdn/airflow:latest
        env:
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: "postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow"
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "false"
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            configMapKeyRef:
              name: ibdn-config
              key: MLFLOW_TRACKING_URI
        command: ["airflow", "scheduler"]
        resources:
          requests:
            memory: "256Mi"
          limits:
            memory: "512Mi"
