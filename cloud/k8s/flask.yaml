apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
  namespace: ibdn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      serviceAccountName: flask-sa
      containers:
      - name: flask
        image: europe-west1-docker.pkg.dev/REPLACE_PROJECT/ibdn/flask:latest
        ports:
        - containerPort: 5001
        volumeMounts:
        - name: flask-patches
          mountPath: /app/patches
        envFrom:
        - configMapRef:
            name: ibdn-config
        env:
        - name: FLASK_DEBUG
          value: "1"
        - name: PROJECT_HOME
          value: "/app/"
        - name: SKIP_AUTO_START_PREDICTION
          value: "1"
        - name: DEPLOY_MODE
          value: "gke"
        - name: FLASK_PORT
          value: "5001"
        command: ["bash", "-c"]
        args:
        - |
          cp /app/patches/*.py /app/scripts/web/ 2>/dev/null || true
          python3 scripts/web/predict_flask.py
        resources:
          requests:
            memory: "256Mi"
          limits:
            memory: "512Mi"
      volumes:
      - name: flask-patches
        configMap:
          name: flask-code-patch
---
apiVersion: v1
kind: Service
metadata:
  name: flask
  namespace: ibdn
spec:
  selector:
    app: flask
  ports:
  - port: 5001
