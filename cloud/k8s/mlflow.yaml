apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-pvc
  namespace: ibdn
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: ibdn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      initContainers:
      - name: install
        image: python:3.9-slim
        command: ["sh", "-c"]
        args:
        - "pip install -q mlflow boto3"
      containers:
      - name: mlflow
        image: python:3.9-slim
        ports:
        - containerPort: 5000
        env:
        - name: MLFLOW_S3_ENDPOINT_URL
          value: "http://minio:9000"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            configMapKeyRef:
              name: ibdn-config
              key: MINIO_ROOT_USER
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            configMapKeyRef:
              name: ibdn-config
              key: MINIO_ROOT_PASSWORD
        command:
        - sh
        - "-c"
        args:
        - "pip install -q mlflow boto3 && mlflow server --port 5000 --host 0.0.0.0 --backend-store-uri sqlite:///data/mlflow/mlflow.db --default-artifact-root s3a://lakehouse/mlflow/"
        volumeMounts:
        - name: data
          mountPath: /data/mlflow
        resources:
          requests:
            memory: "512Mi"
          limits:
            memory: "1Gi"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mlflow-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: ibdn
spec:
  selector:
    app: mlflow
  ports:
  - port: 5000
