services:
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - ./data/kafka:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 1G

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    profiles: ["db_cassandra"]
    ports:
      - "9042:9042"
    environment:
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
      - CASSANDRA_HINTED_HANDOFF_ENABLED=false
    volumes:
      - cassandra_data:/var/lib/cassandra
      - cassandra_hints:/opt/cassandra/data/hints
    deploy:
      resources:
        limits:
          memory: 2G

  spark-manager:
    image: ${ARTIFACT_REGISTRY}/spark:${IMAGE_TAG:-latest}
    container_name: spark-manager
    ports:
      - "${SPARK_MASTER_UI_PORT}:8080"
      - "${SPARK_MASTER_PORT}:${SPARK_MASTER_PORT}"
    volumes:
      - .:/app
      - ./data/coursier:/root/.cache/coursier
      - ./data/ivy2:/root/.ivy2
    working_dir: /app
    environment:
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
    deploy:
      resources:
        limits:
          memory: 2G

  spark-worker:
    image: ${ARTIFACT_REGISTRY}/spark:${IMAGE_TAG:-latest}
    container_name: spark-worker
    depends_on:
      - spark-manager
    volumes:
      - .:/app
      - ./data/coursier:/root/.cache/coursier
      - ./data/ivy2:/root/.ivy2
    working_dir: /app
    environment:
      - SPARK_MASTER=${SPARK_MASTER_URL}
      - SPARK_WORKER_MEMORY=6G
      - SPARK_WORKER_CORES=4
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker ${SPARK_MASTER_URL}
    deploy:
      resources:
        limits:
          memory: 7G

  flask:
    image: ${ARTIFACT_REGISTRY}/flask:${IMAGE_TAG:-latest}
    container_name: flask
    ports:
      - "${FLASK_PORT}:${FLASK_PORT}"
    depends_on:
      - kafka
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FLASK_DEBUG=1
      - PROJECT_HOME=/app/
      - DB_MODE=${DB_MODE:-cassandra}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_LOCAL_BOOTSTRAP_SERVERS=${KAFKA_LOCAL_BOOTSTRAP_SERVERS}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - KAFKA_RESPONSE_TOPIC=${KAFKA_RESPONSE_TOPIC}
      - KAFKA_STATUS_TOPIC=${KAFKA_STATUS_TOPIC}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
      - SKIP_AUTO_START_PREDICTION=${SKIP_AUTO_START_PREDICTION:-0}
      - DEPLOY_MODE=${DEPLOY_MODE:-gcloud}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-password}
    deploy:
      resources:
        limits:
          memory: 512M

  mlflow:
    image: python:3.9-slim
    container_name: mlflow
    ports:
      - "${MLFLOW_PORT}:5000"
    volumes:
      - ./data/mlflow:/data/mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    command: >
      sh -c "pip install -q mlflow boto3 && mlflow server --host 0.0.0.0 --backend-store-uri sqlite:///data/mlflow/mlflow.db --default-artifact-root s3a://lakehouse/mlflow/"
    depends_on:
      - minio
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 768M

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "${MINIO_API_PORT}:${MINIO_API_PORT}"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    image: postgres:13
    container_name: airflow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - ./data/airflow_postgres:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 128M

  airflow-init:
    image: ${ARTIFACT_REGISTRY}/airflow:${IMAGE_TAG:-latest}
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dags:/opt/airflow/dags
    command: >
      bash -c "airflow db migrate && python /app/docker/airflow_init_user.py"

  airflow-webserver:
    image: ${ARTIFACT_REGISTRY}/airflow:${IMAGE_TAG:-latest}
    container_name: airflow-webserver
    depends_on:
      - postgres
    restart: on-failure
    ports:
      - "8085:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_CONN_SPARK_MASTER: http://spark-manager:8080
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_FIRSTNAME: Admin
      _AIRFLOW_WWW_USER_LASTNAME: User
      _AIRFLOW_WWW_USER_EMAIL: admin@example.com
      _AIRFLOW_WWW_USER_ROLE: Admin
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dags:/opt/airflow/dags
    command: api-server
    deploy:
      resources:
        limits:
          memory: 512M

  airflow-scheduler:
    image: ${ARTIFACT_REGISTRY}/airflow:${IMAGE_TAG:-latest}
    container_name: airflow-scheduler
    depends_on:
      - postgres
    restart: on-failure
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dags:/opt/airflow/dags
    command: scheduler
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  minio_data:
  cassandra_data:
  cassandra_hints:
