<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>IBDN · Cluster Startup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>&#9992;</text></svg>">
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #16161e; color: #b0b0b8; line-height: 1.5;
  height: 100vh; overflow: hidden;
}
.split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
}

/* Left panel - Progress */
.progress-panel {
  padding: 3rem 3rem 2rem;
  display: flex; flex-direction: column;
  border-right: 1px solid #2a2a3a;
  overflow-y: auto;
}
.progress-panel h1 {
  font-size: 1.5rem; color: #d0d0d8; margin-bottom: 0.5rem;
  font-weight: 700; letter-spacing: -0.5px;
}
.progress-panel .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 2rem; }
.step-list { list-style: none; }
.step {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.75rem 1rem; margin-bottom: 0.25rem;
  border-radius: 8px; background: #1e1e2a;
  transition: background 0.2s;
}
.step:hover { background: #24243a; }
.step-icon {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
  background: #2a2a3a; color: #555;
}
.step.pending .step-icon { background: #2a2a3a; color: #555; }
.step.running .step-icon {
  background: #fbbf2420; color: #fbbf24;
  animation: pulse 1.2s ease-in-out infinite;
}
.step.done .step-icon { background: #22c55e20; color: #22c55e; }
.step.done .step-name { color: #22c55e; }
.step.failed .step-icon { background: #ef444420; color: #ef4444; }
.step-name { flex: 1; font-size: 0.9rem; color: #d0d0d8; }
.step.pending .step-name { color: #555; }
.step-msg { font-size: 0.75rem; color: #666; font-family: 'SF Mono', 'Fira Code', monospace; }
.step.running .step-msg { color: #fbbf24; }
.step.done .step-msg { color: #22c55e; }
.step.failed .step-msg { color: #ef4444; }

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.5); opacity: 0.6; }
}

/* Right panel - Terminal */
.terminal-panel {
  display: flex; flex-direction: column;
  background: #0d0d14;
  height: 100vh;
}
.terminal-header {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid #2a2a3a;
  background: #1e1e2a;
  display: flex; align-items: center; gap: 0.5rem;
  font-size: 0.75rem; color: #888;
  font-family: 'SF Mono', 'Fira Code', monospace;
  flex-shrink: 0;
}
.terminal-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #2a2a3a;
}
.terminal-dot.active { background: #22c55e; box-shadow: 0 0 6px #22c55e80; }
.terminal-body {
  flex: 1; overflow-y: auto; padding: 0.75rem 1rem;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 0.7rem; line-height: 1.6; color: #888;
  white-space: pre-wrap; word-break: break-all;
}
.terminal-body::-webkit-scrollbar { width: 6px; }
.terminal-body::-webkit-scrollbar-track { background: #0d0d14; }
.terminal-body::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }
.terminal-body .log-time { color: #555; margin-right: 0.5rem; min-width: 52px; display: inline-block; }
.terminal-body .log-service-tag {
  display: inline-block; padding: 0 0.3rem; border-radius: 2px;
  font-weight: 600; font-size: 0.65rem; margin-right: 0.4rem;
}

/* Responsive */
@media (max-width: 900px) {
  .split { grid-template-columns: 1fr; grid-template-rows: auto 50vh; }
  .progress-panel { border-right: none; border-bottom: 1px solid #2a2a3a; }
}
    </style>
  </head>
  <body>
    <div class="split">
      <div class="progress-panel">
        <h1>Cluster Startup {% if DEPLOY_MODE == 'gke' %}<span style="display:inline-block;background:#fdc41b20;color:#fdc41b;border:1px solid #fdc41b40;border-radius:3px;padding:0.1rem 0.5rem;font-size:0.55em;font-weight:600;margin-left:0.4rem;vertical-align:middle">⚡ GKE</span>{% elif DEPLOY_MODE == 'gcloud' %}<span style="display:inline-block;background:#2563eb20;color:#60a5fa;border:1px solid #2563eb40;border-radius:3px;padding:0.1rem 0.5rem;font-size:0.55em;font-weight:600;margin-left:0.4rem;vertical-align:middle">☁️ GCloud</span>{% else %}<span style="display:inline-block;background:#22c55e20;color:#22c55e;border:1px solid #22c55e40;border-radius:3px;padding:0.1rem 0.5rem;font-size:0.55em;font-weight:600;margin-left:0.4rem;vertical-align:middle">🖥️ Local</span>{% endif %}</h1>
        <p class="subtitle">Initializing services and data pipeline...</p>
        <ul class="step-list" id="steps"></ul>
      </div>
      <div class="terminal-panel">
        <div class="terminal-header">
          <div class="terminal-dot" id="live-dot"></div>
          <span>logs</span>
        </div>
        <div class="terminal-body" id="logs"></div>
      </div>
    </div>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
      const socket = io();
      const steps = {};
      const stepOrder = [
        'core_services', 'infra_services', 'buckets',
        'download', 'upload', 'import_distances',
        'topics', 'prediction', 'done'
      ];
      const stepLabels = {
        core_services: 'Starting core services',
        infra_services: 'Starting Spark, MinIO, MLflow',
        buckets: 'Creating MinIO buckets',
        download: 'Downloading flight data',
        upload: 'Uploading data to MinIO',
        import_distances: 'Importing distance data',
        topics: 'Creating Kafka topics',
        prediction: 'Starting prediction engine',
        done: 'Ready'
      };

      function render() {
        const container = document.getElementById('steps');
        let html = '';
        for (const key of stepOrder) {
          const s = steps[key] || { status: 'pending', message: '' };
          const icon = s.status === 'done' ? '\u2713' : s.status === 'running' ? '\u25CF' : s.status === 'failed' ? '\u2717' : '\u00B7';
          html += `<li class="step ${s.status}">
            <div class="step-icon">${icon}</div>
            <div class="step-name">${stepLabels[key] || key}</div>
            <div class="step-msg">${s.message || ''}</div>
          </li>`;
        }
        container.innerHTML = html;
      }

      socket.on('pipeline_progress', (data) => {
        steps[data.step] = data;
        render();
        if (data.step === 'done' && data.status === 'done') {
          setTimeout(() => { window.location.href = '/?done=1'; }, 1500);
        }
      });

      socket.on('connect', () => {
        fetch('/api/pipeline/progress')
          .then(r => r.json())
          .then(state => {
            Object.keys(state).forEach(k => { steps[k] = state[k]; });
            render();
            if (state.done && state.done.status === 'done') {
              setTimeout(() => { window.location.href = '/'; }, 1500);
            }
          })
          .catch(() => {});
      });

      function fetchLogs() {
        fetch('/api/logs/all')
          .then(r => r.json())
          .then(data => {
            if (data.logs) {
              const el = document.getElementById('logs');
              const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 50;
              el.innerHTML = data.logs;
              if (wasAtBottom || el.scrollTop === 0) {
                el.scrollTop = el.scrollHeight;
              }
              document.getElementById('live-dot').classList.add('active');
              setTimeout(() => document.getElementById('live-dot').classList.remove('active'), 1000);
            }
          })
          .catch(() => {});
      }

      fetchLogs();
      setInterval(fetchLogs, 2000);

      render();
    </script>
  </body>
</html>
